<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#20211f" />
    <title>生日魔塔</title>
  </head>
  <body>
    <div id="app">
      <div id="game-shell">
        <div id="banner"></div>
        <div id="game-area">
          <div id="left-panel" class="side-panel"></div>
          <canvas id="game-canvas" aria-label="生日魔塔游戏画布"></canvas>
          <div id="right-panel" class="side-panel"></div>
        </div>
        <div id="touch-controls" aria-hidden="true">
          <div id="joystick-base">
            <div id="joystick-knob"></div>
          </div>
        </div>
        <div id="message" role="status" aria-live="polite"></div>
        <div id="shop-overlay">
          <div class="shop-panel">
            <div class="shop-title">商人</div>
            <div class="shop-gold">金币: 0</div>
            <button class="shop-btn" data-shop="hp">HP+100 (30金)</button>
            <button class="shop-btn" data-shop="atk">攻+5 (50金)</button>
            <button class="shop-btn" data-shop="def">防+5 (50金)</button>
            <button class="shop-close">关闭</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
