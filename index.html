<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#20211f" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>生日魔塔</title>
  </head>
  <body>
    <div id="app">
      <div id="game-shell">
        <div id="banner"></div>
        <div id="game-area">
          <canvas id="game-canvas" aria-label="生日魔塔游戏画布"></canvas>
        </div>
        <div id="left-wrap">
          <div id="left-panel" class="side-panel"></div>
        </div>
        <button id="restart-btn" title="重新开始">↺</button>
        <div id="touch-controls" aria-hidden="true">
          <div id="dpad">
            <button class="dpad-btn dpad-up" data-dir="up">▲</button>
            <button class="dpad-btn dpad-left" data-dir="left">◀</button>
            <button class="dpad-btn dpad-right" data-dir="right">▶</button>
            <button class="dpad-btn dpad-down" data-dir="down">▼</button>
          </div>
        </div>
        <div id="message" role="status" aria-live="polite"></div>
        <div id="shop-overlay">
          <div class="shop-panel">
            <div class="shop-title">商人</div>
            <div class="shop-gold">金币: 0</div>
            <button class="shop-btn" data-shop="hp">HP+100 (30金)</button>
            <button class="shop-btn" data-shop="atk">攻+5 (50金)</button>
            <button class="shop-btn" data-shop="def">防+5 (50金)</button>
            <button class="shop-close">关闭</button>
          </div>
        </div>
        <div id="battle-confirm">
          <div class="confirm-panel">
            <div class="confirm-title">战斗确认</div>
            <div class="confirm-body"></div>
            <div class="confirm-actions">
              <button class="confirm-btn confirm-yes">战斗</button>
              <button class="confirm-btn confirm-no">取消</button>
            </div>
          </div>
        </div>
        <div id="death-overlay">
          <div class="confirm-panel">
            <div class="confirm-title">你被击败了</div>
            <div class="death-body"></div>
            <div class="confirm-actions">
              <button class="confirm-btn confirm-yes death-restart">重新开始</button>
            </div>
          </div>
        </div>
        <div id="restart-confirm">
          <div class="confirm-panel">
            <div class="confirm-title">重新开始</div>
            <div class="confirm-body" style="color:#ff5f56">当前进度将被清除</div>
            <div class="confirm-actions">
              <button class="confirm-btn confirm-yes restart-yes">确定</button>
              <button class="confirm-btn confirm-no restart-no">取消</button>
            </div>
          </div>
        </div>
        <div id="princess-overlay">
          <div class="shop-panel">
            <div class="shop-title">公主的祝福</div>
            <div class="shop-gold">选择一项增益（仅一次）</div>
            <button class="shop-btn" data-princess="hp">HP +500</button>
            <button class="shop-btn" data-princess="atk">攻击 +50</button>
            <button class="shop-btn" data-princess="def">防御 +50</button>
          </div>
        </div>
        <div id="treasure-confirm">
          <div class="confirm-panel">
            <div class="confirm-title">★ 神秘宝物</div>
            <div class="confirm-body">攻击和防御将翻倍！确认领取？</div>
            <div class="confirm-actions">
              <button class="confirm-btn confirm-yes treasure-yes">领取</button>
              <button class="confirm-btn confirm-no treasure-no">暂时不要</button>
            </div>
          </div>
        </div>
        <div id="fairy-confirm">
          <div class="confirm-panel">
            <div class="confirm-title">仙子的祝福</div>
            <div class="fairy-body">HP/攻/防 提升50%</div>
            <div class="confirm-actions">
              <button class="confirm-btn confirm-yes fairy-yes">接受祝福</button>
              <button class="confirm-btn confirm-no fairy-no">暂时不要</button>
            </div>
          </div>
        </div>
        <div id="victory-chest">
          <div class="chest-container">
            <div class="chest-icon">🎁</div>
            <div class="chest-text">点击打开宝箱</div>
          </div>
        </div>
        <div id="keyshop-overlay">
          <div class="shop-panel">
            <div class="shop-title">钥匙商人</div>
            <div class="shop-gold">金币: 0</div>
            <div class="keyshop-remain">剩余: 5</div>
            <button class="shop-btn" data-keyshop="yellow">黄钥匙 (100金)</button>
            <button class="shop-btn" data-keyshop="blue">蓝钥匙 (100金)</button>
            <button class="shop-btn" data-keyshop="red">红钥匙 (100金)</button>
            <button class="shop-close">关闭</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
