<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#20211f" />
    <title>生日魔塔</title>
  </head>
  <body>
    <div id="app">
      <div id="game-shell">
        <div id="banner"></div>
        <button id="restart-btn">重新开始</button>
        <div id="game-area">
          <canvas id="game-canvas" aria-label="生日魔塔游戏画布"></canvas>
        </div>
        <div id="right-panel" class="side-panel"></div>
        <div id="touch-controls" aria-hidden="true">
          <div id="joystick-base">
            <div id="joystick-knob"></div>
          </div>
        </div>
        <div id="message" role="status" aria-live="polite"></div>
        <div id="shop-overlay">
          <div class="shop-panel">
            <div class="shop-title">商人</div>
            <div class="shop-gold">金币: 0</div>
            <button class="shop-btn" data-shop="hp">HP+100 (30金)</button>
            <button class="shop-btn" data-shop="atk">攻+5 (50金)</button>
            <button class="shop-btn" data-shop="def">防+5 (50金)</button>
            <button class="shop-close">关闭</button>
          </div>
        </div>
        <div id="battle-confirm">
          <div class="confirm-panel">
            <div class="confirm-title">战斗确认</div>
            <div class="confirm-body"></div>
            <div class="confirm-actions">
              <button class="confirm-btn confirm-yes">战斗</button>
              <button class="confirm-btn confirm-no">取消</button>
            </div>
          </div>
        </div>
        <div id="death-overlay">
          <div class="confirm-panel">
            <div class="confirm-title">你被击败了</div>
            <div class="death-body"></div>
            <div class="confirm-actions">
              <button class="confirm-btn confirm-yes death-restart">重新开始</button>
            </div>
          </div>
        </div>
        <div id="restart-confirm">
          <div class="confirm-panel">
            <div class="confirm-title">重新开始</div>
            <div class="confirm-body" style="color:#ff5f56">当前进度将被清除</div>
            <div class="confirm-actions">
              <button class="confirm-btn confirm-yes restart-yes">确定</button>
              <button class="confirm-btn confirm-no restart-no">取消</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
